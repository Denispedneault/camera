
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Scanner caméra</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- ✅ LA SEULE BONNE FAÇON DE CHARGER LA LIBRAIRIE -->
  <script src="https://unpkg.com/html5-qrcode@2.3.8/minified/html5-qrcode.min.js"></script>
</head>

<body style="text-align:center;">
  <h2>Scanner QR</h2>

  <button onclick="start()">📷 Ouvrir la caméra</button>

  <div id="reader" style="width:300px;margin:20px auto;"></div>

<script>
  function start() {
    const qr = new Html5Qrcode("reader");

    qr.start(
      { facingMode: "environment" },
      { fps: 10 },
      (text) => {

        // ENVOI DU CODE VERS GOOGLE SHEETS
        fetch("https://script.google.com/macros/s/AKfycbwRmYeT446vNJivzB1t0UZnrKb_NqQZEMVeNzt2mb6WyD-AQ0_368L2gG2EYSCOVj68/exec", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ code: text })
        });

        alert("Code envoyé : " + text);
        qr.stop();
      },
      () => {}
    );
  }
</script>
``
