
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>TEST CAMERA HUB</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- OBLIGATOIRE : chargement réel de la librairie -->
  <script src="https://unpkg.com/html5-qrcode@2.3.8/minified/html5-qrcode.min.js"></script>
</head>

<body style="text-align:center;font-family:Arial;">
  <h2>TEST CAMERA HUB</h2>

  <button onclick="startCamera()">📷 Ouvrir la caméra</button>

  <div id="reader" style="width:300px;margin:20px auto;"></div>

  <script>
    function startCamera() {
      if (!window.Html5Qrcode) {
        alert("❌ Librairie caméra non chargée");
        return;
      }

      const scanner = new Html5Qrcode("reader");

      scanner.start(
        { facingMode: "environment" },
        { fps: 10 },
        () => {},
        (err) => {}
      ).catch(e => {
        alert("❌ Erreur caméra : " + e);
      });
    }
  </script>
</body>
</html>
