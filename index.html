
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>TEST CAMÉRA HUB</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Chargement garanti de la librairie -->
  <script src="https://unpkg.com/html5-qrcode@2.3.8/minified/html5-qrcode.min.js"></script>
</head>

<body style="text-align:center; font-family: Arial;">
  <h2>TEST CAMÉRA HUB</h2>

  <button onclick="ouvrirCamera()">📷 Ouvrir la caméra</button>

  <div id="camera" style="width:300px; margin:20px auto;"></div>

  <script>
    function ouvrirCamera() {
      if (!window.Html5Qrcode) {
        alert("Librairie caméra NON chargée");
        return;
      }

      const scanner = new Html5Qrcode("camera");

      scanner.start(
        { facingMode: "environment" },
        { fps: 10 },
        () => {},
        () => {}
      ).catch(err => {
        alert("Erreur caméra : " + err);
      });
    }
  </script>
</body>
</html>
