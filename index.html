
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>TEST CAMERA PUR</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body style="text-align:center; font-family:Arial;">
  <h2>TEST CAMERA PUR</h2>

  <button onclick="ouvrirCamera()">📷 Ouvrir la caméra</button>

  <video id="video" autoplay playsinline style="width:300px;margin-top:20px;"></video>

  <script>
    async function ouvrirCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: "environment" }
        });
        document.getElementById("video").srcObject = stream;
      } catch (err) {
        alert("❌ Caméra refusée : " + err.name);
      }
    }
  </script>
</body>
</html>
